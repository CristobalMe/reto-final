services:
  mysql:
    image: mysql:8.0
    container_name: talos-tecmty-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: talos_tecmty
      TZ: UTC
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - talos_tecmty_mysql_data:/var/lib/mysql
      - ./deployment/mysql/conf.d:/etc/mysql/conf.d:ro
      - ./deployment/mysql/initdb:/docker-entrypoint-initdb.d:ro
      - ./data/talos_tecmty:/seed:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  talos_tecmty_mysql_data:
