services:
  mysql:
    image: mysql:8.0
    container_name: talos-tecmty-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: talos_tecmty
      TZ: UTC
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - talos_tecmty_mysql_data:/var/lib/mysql
      - ./deployment/mysql/conf.d:/etc/mysql/conf.d:ro
      - ./deployment/mysql/initdb:/docker-entrypoint-initdb.d:ro
      - ./data/talos_tecmty:/seed:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin --no-defaults ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: talos-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=talos_tecmty
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: talos-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  talos_tecmty_mysql_data:
